name: Build Mod Menu
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang
      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
      - name: Setup SDKs
        run: |
          # إنشاء المجلد الذي يبحث عنه Theos
          mkdir -p $HOME/theos/sdks
          # تحميل نسخة SDK مناسبة (iPhoneOS 16.5)
          curl -LO https://github.com/theos/sdks/releases/download/latest/iPhoneOS16.5.sdk.tar.xz
          tar -xf iPhoneOS16.5.sdk.tar.xz -C $HOME/theos/sdks
      - name: Build
        run: |
          export THEOS=$HOME/theos
          make package
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModMenu
          path: packages/
