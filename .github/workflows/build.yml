name: Build Mod Menu
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: theos/sdks:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          make package
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModMenu
          path: packages/
